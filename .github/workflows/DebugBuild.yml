name: DebugBuild
on:
  push:
    branches:
      - master

env:
  # リポジトリのルートディレクトリを基点としたソリューションファイルのパス
  SOLUTION_FILE_PATH: project/CG2.sln
  # Visual Studio の構成(Debug / Release)
  CONFIGURATION: Debug

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Install Windows 11 SDK 10.0.22621
        run: choco install windows-sdk-10-version-22621-all -y

      - name: Build
        run: |
          msbuild ${{env.SOLUTION_FILE_PATH}} `
          /p:Platform=x64 `
          /p:Configuration=${{env.CONFIGURATION}} `
          /p:PlatformToolset=v143 `
          /p:WindowsTargetPlatformVersion=10.0.22621.0

