name: DebugBuild

on:
  push:
    branches:
      - master

env:
  SOLUTION_FILE_PATH: project/CG2.sln
  CONFIGURATION: Debug

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # VS2026 Build Tools を Chocolatey でインストール
      - name: Install Visual Studio 2026 Build Tools
        shell: pwsh
        run: |
          Write-Host "Installing VS 2026 Build Tools..."
          choco install visualstudio2026buildtools `
            --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 --includeRecommended --quiet" `
            -y --ignore-package-exit-codes=3010
          Write-Host "VS 2026 Build Tools installation completed"

      # VS2026 の環境を有効化してビルド
      - name: Build with VS2026 (v145)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\18\Community\Common7\Tools\VsDevCmd.bat"
          msbuild %SOLUTION_FILE_PATH% /p:Platform=x64 /p:Configuration=%CONFIGURATION%
